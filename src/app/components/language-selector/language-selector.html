<div class="lang-selector">
  <button class="lang-selector__trigger" (click)="toggleDropdown()" [attr.aria-expanded]="isOpen()" aria-label="Select language">
    <span class="lang-selector__flag">{{ langService.language() === 'en' ? '🇺🇸' : '🇧🇷' }}</span>
    <span class="lang-selector__label">{{ langService.language() === 'en' ? 'EN' : 'PT' }}</span>
  </button>

  @if (isOpen()) {
    <div class="lang-selector__dropdown">
      <button
        class="lang-selector__option"
        [class.lang-selector__option--active]="langService.language() === 'en'"
        (click)="selectLanguage('en')"
      >
        <span class="lang-selector__flag">🇺🇸</span>
        English
      </button>
      <button
        class="lang-selector__option"
        [class.lang-selector__option--active]="langService.language() === 'pt-br'"
        (click)="selectLanguage('pt-br')"
      >
        <span class="lang-selector__flag">🇧🇷</span>
        Português
      </button>
    </div>
  }
</div>
