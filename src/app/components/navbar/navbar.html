<header class="navbar">
  <div class="navbar__container">
    <a routerLink="/" class="navbar__logo">
      <span class="material-symbols-outlined navbar__logo-icon">insights</span>
      InsightTech Solutions
    </a>

    <nav class="navbar__nav" [class.navbar__nav--open]="isMenuOpen()">
      <a routerLink="/" routerLinkActive="navbar__link--active" [routerLinkActiveOptions]="{ exact: true }" class="navbar__link">{{ 'nav.home' | translate }}</a>
      <a routerLink="/services" routerLinkActive="navbar__link--active" class="navbar__link">{{ 'nav.services' | translate }}</a>
      <a routerLink="/case-studies" routerLinkActive="navbar__link--active" class="navbar__link">{{ 'nav.caseStudies' | translate }}</a>
      <a routerLink="/contact" routerLinkActive="navbar__link--active" class="navbar__link">{{ 'nav.contact' | translate }}</a>
    </nav>

    <div class="navbar__actions">
      <button class="navbar__cta" routerLink="/contact">
        {{ 'common.getStarted' | translate }}
      </button>
      <app-language-selector />
    </div>

    <button class="navbar__mobile-toggle" (click)="toggleMenu()" aria-label="Toggle menu" [attr.aria-expanded]="isMenuOpen()">
      <span class="material-symbols-outlined">{{ isMenuOpen() ? 'close' : 'menu' }}</span>
    </button>
  </div>
</header>
